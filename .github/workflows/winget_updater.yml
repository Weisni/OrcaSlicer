name: Publish to WinGet
on:
  release:
    types: [ released ]
jobs:
  publish:
    # This is the upstream OrcaSlicer package. QuackSlicer needs its own WinGet
    # identifier and token before a fork may publish anything here.
    if: github.repository == 'OrcaSlicer/OrcaSlicer'
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: SoftFever.OrcaSlicer
          version: ${{ github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: '\.exe$'
